{% extends 'base.html' %}
{% load static %}

{% block title %}Add/Edit Department - Student Management System{% endblock %}

{% block content %}
<div class="container-fluid px-4">
    <h1 class="mt-4">Department Form</h1>
    <ol class="breadcrumb mb-4">
        <li class="breadcrumb-item"><a href="{% url 'index' %}">Dashboard</a></li>
        <li class="breadcrumb-item"><a href="{% url 'department_list' %}">Departments</a></li>
        <li class="breadcrumb-item active">Add/Edit Department</li>
    </ol>
    
    <div class="card mb-4">
        <div class="card-header">
            <i class="fas fa-building me-1"></i>
            Department Details
        </div>
        <div class="card-body">
            <form action="#" method="POST">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <div class="form-floating mb-3 mb-md-0">
                            <input class="form-control" id="inputDeptName" type="text" placeholder="Department Name" />
                            <label for="inputDeptName">Department Name</label>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-floating">
                            <input class="form-control" id="inputHOD" type="text" placeholder="Head of Department" />
                            <label for="inputHOD">Head of Department</label>
                        </div>
                    </div>
                </div>
                
                <div class="row mb-3">
                    <div class="col-md-6">
                        <div class="form-floating mb-3 mb-md-0">
                            <input class="form-control" id="inputStartYear" type="number" placeholder="Started Year" />
                            <label for="inputStartYear">Started Year</label>
                        </div>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label for="inputDescription" class="form-label">Description</label>
                    <textarea class="form-control" id="inputDescription" rows="3" placeholder="Enter department description"></textarea>
                </div>
                
                <div class="mt-4 mb-0">
                    <div class="d-grid"><button class="btn btn-primary btn-block" type="submit">Save Department</button></div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
